services:
  kolla_ansible:
    container_name: kolla_ansible
    build:
      context: ..
      dockerfile: kolla-ansible/Dockerfile
    environment:
      - ANSIBLE_CONFIG=/etc/kolla/ansible.cfg
      - ANSIBLE_COLLECTIONS_PATH=/usr/share/ansible/collections
      - PUID=1000
      - PGID=1000
      - OS_CLOUD=kolla-admin-internal
      - OS_CLIENT_CONFIG_FILE=/etc/kolla/clouds.yaml
    command:
      - "/bin/sh"
      - "-c"
      - |
        sleep infinity
    restart: always
    volumes:
      - ${PWD}/kolla-ansible/etc/kolla:/etc/kolla:rw
      # /etc/openstack is required for kolla-ansible post-deploy
      - ${PWD}/kolla-ansible/etc/openstack:/etc/openstack:rw
      # Docker socket for docker CLI access to host daemon
      - /var/run/docker.sock:/var/run/docker.sock:rw
      # Scripts for kolla-push etc.
      - ${PWD}/scripts:/scripts:ro
    network_mode: host

  registry:
    container_name: registry
    image: registry:2
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - registry_data:/var/lib/registry

volumes:
  registry_data:
